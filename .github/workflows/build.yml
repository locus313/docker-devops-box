name: 'build'

on:
  push:
    branches:
    - main
    paths-ignore:
      - '**/*.md'
  pull_request:
    paths-ignore:
      - '**/*.md'

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    name: 'Build'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PAT }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: true
          tags: ghcr.io/locus313/docker-devops-box:latest
          cache-from: type=registry,ref=ghcr.io/locus313/docker-devops-box:buildcache
          cache-to: type=registry,ref=ghcr.io/locus313/docker-devops-box:buildcache,mode=max

      - name: Scan image with Grype
        uses: anchore/scan-action@v3
        id: scan
        with:
          image: ghcr.io/locus313/docker-devops-box:latest
          fail-build: true
          severity-cutoff: critical

      - name: Upload SARIF report to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
