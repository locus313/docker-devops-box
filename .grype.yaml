# Grype vulnerability scan configuration
#
# Ignore rules are organised into two categories:
#
#  1. Go stdlib CVEs with no upstream fix yet – all affected binaries are
#     third-party pre-built releases; we cannot recompile them.
#  2. System packages (deb) where Ubuntu has not yet released a patched version.
#
# All suppressions are reviewed and re-evaluated when upstream fixes land.
# Note: legacy Terraform version ignores (0.12.31, 0.14.11, 1.5.7, 1.9.8,
# 1.10.5) were removed when the image moved to only baking in the latest
# stable release by default.

ignore:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Go stdlib CVEs – no upstream fix available yet
  #
  #    CVE-2025-68121 and CVE-2025-22871 affect every pre-built Go binary in
  #    the image (Docker CE, containerd, runc, rootlesskit, packer,
  #    session-manager-plugin, CNI plugins, crictl, and the default Terraform
  #    release).  These binaries are installed from upstream package
  #    repositories; patched releases have not been published yet.
  # ──────────────────────────────────────────────────────────────────────────
  - vulnerability: CVE-2025-68121
  - vulnerability: CVE-2025-22871

  # ──────────────────────────────────────────────────────────────────────────
  # 2. System (deb) packages – Ubuntu upstream has not released patched
  #    versions for any of these findings.
  #
  #    linux-libc-dev  – kernel header package; CVEs relate to the kernel
  #                      itself (not exploitable via container image headers).
  #                      Ubuntu 24.04 ships 6.8.0-101 with no available update.
  #    libtiff6        – CVE-2025-61144; no Ubuntu fix published.
  # ──────────────────────────────────────────────────────────────────────────
  - package:
      name: linux-libc-dev
      type: deb
  - vulnerability: CVE-2025-61144
    package:
      name: libtiff6
      type: deb
